<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrepreneurial Path Assessment - All Things Abound</title>
  <meta name="description" content="A free 5-minute assessment that reveals your top 3 best-fit business paths — grounded in faith and built with purpose." />
  <link rel="icon" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --indigo: #1E1B4B; --sapphire: #312E81; --violet: #7C3AED;
      --lav: #C4B5FD; --peri: #C7D2FE; --blush: #FBE9F3;
      --topbar-h: 56px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: #FAFAFC; color: #1B1B2F; line-height: 1.6; }

    /* ── Slim top bar (site integration) ─────────────────────────── */
    .site-topbar { position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h); z-index: 200; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; background: rgba(30,27,75,0.96); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(124,58,237,0.22); }
    .tb-logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
    .tb-logo img { height: 30px; width: auto; mix-blend-mode: screen; filter: brightness(1.2); }
    .tb-logo span { font-family: 'Fraunces', serif; font-size: 0.82rem; font-weight: 300; letter-spacing: 0.14em; text-transform: uppercase; color: #fff; }
    .tb-back { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--lav); text-decoration: none; transition: color 0.2s; }
    .tb-back:hover { color: #fff; }
    @media (max-width: 560px) { .tb-logo span { display: none; } }

    #app { padding-top: var(--topbar-h); }
    .fade { animation: fadeIn 0.28s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Intro ───────────────────────────────────────────────────── */
    .intro { min-height: calc(100vh - var(--topbar-h)); background: linear-gradient(160deg, var(--indigo) 0%, var(--sapphire) 65%, #251f5e 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; position: relative; overflow: hidden; }
    .intro-glow { position: absolute; top: 4%; left: 50%; transform: translateX(-50%); width: 420px; height: 420px; border-radius: 50%; background: radial-gradient(circle, rgba(124,58,237,0.2) 0%, transparent 70%); pointer-events: none; }
    .intro-inner { position: relative; max-width: 580px; width: 100%; text-align: center; }
    .brandmark { margin-bottom: 22px; display: flex; justify-content: center; }
    .pill { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.13); border-radius: 40px; padding: 7px 18px; margin-bottom: 26px; font-size: 12px; font-weight: 600; color: var(--lav); letter-spacing: 0.08em; text-transform: uppercase; }
    .intro-h1 { font-family: 'Fraunces', serif; font-size: clamp(34px, 7vw, 56px); font-weight: 500; color: #fff; line-height: 1.12; margin-bottom: 20px; }
    .intro-h1-em { display: block; font-style: italic; font-weight: 500; background: linear-gradient(90deg, var(--lav), var(--peri)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .intro-sub { font-size: clamp(15px, 2.5vw, 17px); color: #D7D6F0; line-height: 1.7; margin-bottom: 16px; }
    .intro-sub strong { color: var(--lav); }
    .intro-verse { font-size: 13.5px; color: var(--peri); font-style: italic; margin-bottom: 32px; font-family: 'Fraunces', serif; }
    .intro-feats { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 40px; }
    .feat { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09); border-radius: 20px; padding: 6px 14px; font-size: 12.5px; color: #C7C6E8; }
    .intro-cta { background: linear-gradient(135deg, var(--violet), var(--sapphire)); color: #fff; border: none; border-radius: 12px; padding: 17px 46px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; box-shadow: 0 8px 32px rgba(124,58,237,0.33); letter-spacing: 0.01em; transition: transform 0.2s; }
    .intro-cta:hover { transform: translateY(-2px); }
    .intro-note { margin-top: 16px; font-size: 13px; color: #9492C4; }

    /* ── Quiz ────────────────────────────────────────────────────── */
    .quiz { min-height: calc(100vh - var(--topbar-h)); background: #FAFAFC; display: flex; flex-direction: column; }
    .quiz-header { background: #fff; border-bottom: 1px solid #F0EFFA; padding: 16px 20px 14px; position: sticky; top: var(--topbar-h); z-index: 10; }
    .quiz-header-inner { max-width: 640px; margin: 0 auto; }
    .quiz-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .qcount { font-size: 12.5px; font-weight: 700; color: var(--sapphire); letter-spacing: 0.06em; text-transform: uppercase; }
    .qback { background: none; border: none; cursor: pointer; font-size: 13px; color: #9CA3AF; font-family: 'Inter', sans-serif; }
    .qback:hover { color: var(--violet); }
    .progress { position: relative; height: 6px; background: #EEEDFB; border-radius: 6px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--violet), var(--lav)); border-radius: 6px; transition: width 0.4s ease; }
    .progress-dot { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 12px; height: 12px; border-radius: 50%; background: #fff; border: 2.5px solid var(--violet); transition: left 0.4s ease; }
    .quiz-body { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 36px 20px 40px; }
    .quiz-body-inner { max-width: 640px; width: 100%; }
    .q-head { margin-bottom: 28px; }
    .q-note { display: inline-flex; align-items: center; gap: 6px; background: var(--blush); border: 1px solid rgba(196,181,253,0.4); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--sapphire); font-weight: 600; margin-bottom: 12px; }
    .q-text { font-family: 'Fraunces', serif; font-size: clamp(22px, 4vw, 30px); font-weight: 500; color: #1B1B3A; line-height: 1.3; }
    .q-options { display: flex; flex-direction: column; gap: 10px; }
    .opt { background: #fff; border: 2px solid #E9E8F5; border-radius: 12px; padding: 16px 20px; text-align: left; cursor: pointer; font-size: 15px; color: #374151; font-weight: 500; font-family: 'Inter', sans-serif; line-height: 1.5; display: flex; align-items: center; gap: 14px; transition: border-color 0.15s, background 0.15s; }
    .opt:hover { border-color: var(--lav); }
    .opt.sel { background: rgba(124,58,237,0.05); border-color: var(--violet); color: var(--indigo); font-weight: 600; box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
    .opt-radio { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #D1D5DB; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .opt.sel .opt-radio { border-color: var(--violet); background: var(--violet); }
    .opt-dot { width: 7px; height: 7px; border-radius: 50%; background: #fff; }

    /* ── Results ─────────────────────────────────────────────────── */
    .results { min-height: calc(100vh - var(--topbar-h)); background: #FAFAFC; }
    .results-hero { background: linear-gradient(160deg, var(--indigo) 0%, var(--sapphire) 100%); padding: 40px 20px 50px; text-align: center; position: relative; overflow: hidden; }
    .results-hero-glow { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 600px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(124,58,237,0.18) 0%, transparent 70%); pointer-events: none; }
    .results-hero-inner { position: relative; max-width: 600px; margin: 0 auto; }
    .results-h1 { font-family: 'Fraunces', serif; font-size: clamp(26px, 6vw, 40px); font-weight: 500; color: #fff; margin-bottom: 12px; line-height: 1.2; }
    .results-sub { font-size: 15px; color: #C7C6E8; margin-bottom: 16px; line-height: 1.6; }
    .age-note { background: rgba(255,255,255,0.05); border: 1px solid rgba(196,181,253,0.2); border-radius: 14px; padding: 14px 18px; margin: 0 auto 16px; text-align: left; max-width: 480px; font-size: 13px; color: #D7D6F0; line-height: 1.6; }
    .top3-chips { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
    .top3-chip { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 30px; padding: 8px 18px; font-size: 13.5px; font-weight: 600; color: #E9E8F5; }
    .results-body { max-width: 640px; margin: 0 auto; padding: 32px 16px 30px; }
    .results-hint { font-size: 14px; color: #9CA3AF; text-align: center; margin-bottom: 20px; }

    .rank { display: flex; align-items: center; gap: 12px; }
    .rank-num { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--violet); display: flex; align-items: center; justify-content: center; font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; color: var(--violet); flex-shrink: 0; }
    .rank-num.dark { border-color: rgba(255,255,255,0.33); color: #fff; }
    .rank-label { font-family: 'Inter', sans-serif; font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #9CA3AF; }
    .rank-label.dark { color: rgba(255,255,255,0.6); }

    /* Full result card */
    .frc { border-radius: 18px; border: 2px solid #E5E7EB; background: #fff; margin-bottom: 16px; overflow: hidden; transition: all 0.3s; }
    .frc-head { width: 100%; border: none; cursor: pointer; padding: 18px 20px; display: flex; align-items: center; gap: 14px; text-align: left; transition: background 0.3s; }
    .frc-titles { flex: 1; }
    .frc-name { font-size: 18px; font-weight: 600; font-family: 'Fraunces', serif; }
    .frc-tag { font-size: 13px; margin-top: 2px; }
    .frc-chev { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid #E5E7EB; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: transform 0.3s; flex-shrink: 0; }
    .frc-body { padding: 24px 20px; }
    .frc-fits { border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; }
    .frc-fits p { font-size: 14px; line-height: 1.65; color: #1F2937; }
    .frc-block { margin-bottom: 20px; }
    .sl-title { font-size: 11.5px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--sapphire); margin-bottom: 10px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { background: #F3F4F6; border-radius: 20px; padding: 5px 12px; font-size: 13px; color: #374151; font-weight: 500; }
    .frc-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .stat { background: #F9FAFB; border-radius: 12px; padding: 12px 14px; }
    .stat-label { font-size: 10.5px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: #9CA3AF; margin-bottom: 6px; }
    .stat-val { font-size: 14px; font-weight: 700; color: #1F2937; }
    .dm { display: flex; align-items: center; gap: 8px; }
    .dm-bars { display: flex; gap: 4px; }
    .dm-bar { width: 20px; height: 8px; border-radius: 4px; }
    .dm-label { font-size: 12px; font-weight: 600; }
    .step { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
    .step-num { min-width: 24px; height: 24px; border-radius: 50%; background: var(--indigo); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11.5px; font-weight: 700; flex-shrink: 0; font-family: 'Fraunces', serif; }
    .step-text { font-size: 13.5px; line-height: 1.6; color: #374151; }
    .sl { margin-bottom: 18px; }
    .sl-items { display: flex; flex-direction: column; gap: 6px; }
    .sl-row { display: flex; gap: 8px; align-items: flex-start; }
    .sl-dot { color: var(--violet); font-size: 13px; margin-top: 1px; }
    .sl-text { font-size: 13.5px; line-height: 1.6; color: #374151; }
    .days { display: flex; flex-direction: column; gap: 8px; }
    .day { background: #F9FAFB; border-radius: 10px; padding: 10px 14px; display: flex; gap: 10px; }
    .day-week { font-size: 12px; font-weight: 700; min-width: 56px; font-family: 'Fraunces', serif; }
    .day-text { font-size: 13px; color: #374151; line-height: 1.5; }

    .affirm { background: var(--blush); border: 1px solid rgba(196,181,253,0.33); border-radius: 16px; padding: 22px; margin-bottom: 24px; text-align: center; }
    .affirm h3 { font-size: 17px; font-weight: 600; color: var(--indigo); font-family: 'Fraunces', serif; margin-bottom: 8px; }
    .affirm p { font-size: 14px; line-height: 1.7; color: #4C3D63; }

    /* Locked card */
    .lc { border-radius: 18px; border: 2px solid rgba(124,58,237,0.2); background: #fff; margin-bottom: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.03); }
    .lc-head { padding: 18px 20px; display: flex; align-items: center; gap: 14px; }
    .lc-blurwrap { position: relative; }
    .lc-blur { padding: 20px; filter: blur(5px); user-select: none; pointer-events: none; opacity: 0.5; }
    .lc-accent { border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; }
    .lc-line { height: 12px; border-radius: 6px; margin-bottom: 8px; }
    .lc-row { display: flex; gap: 10px; margin-bottom: 8px; }
    .lc-dot2 { width: 22px; height: 22px; border-radius: 50%; background: #E5E7EB; }
    .lc-bar { flex: 1; height: 12px; background: #E5E7EB; border-radius: 6px; }
    .lc-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,0.93) 35%, #fff 100%); }
    .lc-overlay-inner { text-align: center; padding: 0 20px 20px; }
    .lc-overlay-inner svg { margin-bottom: 10px; }
    .lc-title { font-size: 15px; font-weight: 600; color: #1B1B2F; font-family: 'Fraunces', serif; margin-bottom: 8px; }
    .lc-desc { font-size: 13px; color: #6B7280; line-height: 1.6; }

    /* Unlock CTA */
    .unlock { background: linear-gradient(135deg, var(--indigo), var(--sapphire)); border-radius: 22px; padding: 32px 24px; text-align: center; margin-bottom: 24px; box-shadow: 0 8px 40px rgba(49,46,129,0.27); }
    .unlock h2 { font-family: 'Fraunces', serif; font-size: 23px; font-weight: 500; color: #fff; margin-bottom: 10px; line-height: 1.3; }
    .unlock > p { font-size: 14px; color: #C7C6E8; line-height: 1.7; margin-bottom: 20px; }
    .unlock-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; text-align: left; }
    .unlock-item { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px 14px; font-size: 14px; color: #D7D6F0; font-weight: 500; }
    .unlock-price { margin-bottom: 18px; }
    .price { font-size: 30px; font-weight: 700; color: var(--lav); font-family: 'Fraunces', serif; }
    .price-note { font-size: 13px; color: #9492C4; margin-left: 6px; }
    .unlock-btn { display: block; background: linear-gradient(135deg, var(--violet), var(--lav)); color: #fff; text-decoration: none; border-radius: 12px; padding: 17px 32px; font-size: 16px; font-weight: 600; font-family: 'Inter', sans-serif; box-shadow: 0 8px 32px rgba(124,58,237,0.33); margin-bottom: 10px; transition: transform 0.2s; }
    .unlock-btn:hover { transform: translateY(-2px); }
    .unlock-fine { font-size: 12px; color: #9492C4; }

    .retake-wrap { text-align: center; margin-bottom: 8px; }
    .retake { background: none; border: 2px solid #E9E8F5; border-radius: 12px; padding: 12px 28px; font-size: 14px; color: #6B7280; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600; transition: border-color 0.2s, color 0.2s; }
    .retake:hover { border-color: var(--lav); color: var(--indigo); }

    .disclaimer { max-width: 640px; margin: 0 auto; padding: 0 16px 40px; text-align: center; }
    .disclaimer p { font-size: 11.5px; color: #9CA3AF; line-height: 1.6; }
    .disclaimer a { color: var(--violet); text-decoration: underline; }
  </style>
</head>

  // ── Scoring ───────────────────────────────────────────────────────────────
  function computeScores(answers) {
    var scores = { ONL: 0, LOC: 0, CRE: 0, PRD: 0, CON: 0, TEC: 0, HND: 0, MIN: 0 };
    QUESTIONS.forEach(function (q) {
      if (q.type !== "score") return;
      var val = answers[q.id];
      if (!val) return;
      var opt = q.options.find(function (o) { return o.value === val; });
      if (!opt || !opt.scores) return;
      Object.keys(opt.scores).forEach(function (cat) {
        scores[cat] = (scores[cat] || 0) + opt.scores[cat];
      });
    });
    return scores;
  }

  function getTop3(scores) {
    return Object.keys(scores).map(function (k) { return [k, scores[k]]; })
      .sort(function (a, b) { return b[1] - a[1]; })
      .slice(0, 3).map(function (pair) { return pair[0]; });
  }

      sessionStorage.setItem("ata_scores", JSON.stringify(scores));
      sessionStorage.setItem("ata_age", age || "");

  function loadState() {

        age: sessionStorage.getItem("ata_age") || ""
      };
    } catch (e) { return { top3: [], scores: {}, age: "" }; }
  }

      var r = deg * Math.PI / 180;
      lines += '<line x1="' + (20 + 9 * Math.cos(r)) + '" y1="' + (20 + 9 * Math.sin(r)) +
        '" x2="' + (20 + 16 * Math.cos(r)) + '" y2="' + (20 + 16 * Math.sin(r)) +
        '" stroke="' + color + '" stroke-width="1.6" stroke-linecap="round" opacity="0.85" />';
    });
    return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="6" stroke="' + color + '" stroke-width="1.6" />' + lines + '</svg>';
  }

  function lockIcon() {
    return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="9" rx="2" stroke="#7C3AED" stroke-width="1.6"/><path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="#7C3AED" stroke-width="1.6" stroke-linecap="round"/></svg>';
  }

  function rankBadge(rank, dark) {
    var numerals = ["I", "II", "III"], labels = ["Best Match", "Strong Match", "Good Match"];
    return '<div class="rank"><div class="rank-num' + (dark ? " dark" : "") + '">' + numerals[rank] +
      '</div><span class="rank-label' + (dark ? " dark" : "") + '">' + labels[rank] + '</span></div>';
  }

  function difficultyMeter(level) {
    var colors = ["", "#22C55E", "#84CC16", "#F59E0B", "#EF4444"];
    var labels = ["", "Easy", "Easy–Moderate", "Moderate", "Challenging"];
    var bars = "";
    for (var i = 1; i <= 4; i++) {
      bars += '<div class="dm-bar" style="background:' + (i <= level ? colors[level] : "#E5E7EB") + '"></div>';
    }
    return '<div class="dm"><div class="dm-bars">' + bars + '</div><span class="dm-label" style="color:' + colors[level] + '">' + labels[level] + '</span></div>';
  }

  function sectionList(title, items) {
    return '<div class="sl"><h4 class="sl-title">' + title + '</h4><div class="sl-items">' +
      items.map(function (it) { return '<div class="sl-row"><span class="sl-dot">·</span><p class="sl-text">' + esc(it) + '</p></div>'; }).join("") +
      '</div></div>';
  }

  // ── Screens ─────────────────────────────────────────────────────────────────
  function IntroScreen() {
    var feats = ["Free to take", "8 business categories", "No experience needed", "Faith-driven results"];
    return '' +
      '<section class="intro"><div class="intro-glow"></div><div class="intro-inner">' +
      '<div class="brandmark">' + brandMark(34, "#C4B5FD") + '</div>' +
      '<div class="pill">Free Assessment · 5 Minutes</div>' +
      '<h1 class="intro-h1">Discover Your<span class="intro-h1-em">Entrepreneurial Path</span></h1>' +
      '<p class="intro-sub">Answer <strong>' + QUESTIONS.length + ' simple questions</strong> and discover your top 3 best-fit business paths — grounded in faith and built with purpose.</p>' +
      '<p class="intro-verse">"God is able to make all grace abound to you, so that having all you need, you\'ll abound in every good work." — 2 Corinthians 9:8</p>' +
      '<div class="intro-feats">' + feats.map(function (f) { return '<div class="feat">' + f + '</div>'; }).join("") + '</div>' +
      '<button class="intro-cta" data-action="start">Start My Free Assessment →</button>' +
      '<p class="intro-note">No sign-up required. 100% free.</p>' +
      '</div></section>';
  }

  function QuestionScreen() {
    var q = QUESTIONS[state.currentQ];
    var total = QUESTIONS.length;
    var progress = (state.currentQ / total) * 100;
    var selected = state.answers[q.id];
    return '' +
      '<div class="quiz"><div class="quiz-header"><div class="quiz-header-inner">' +
      '<div class="quiz-header-row"><span class="qcount">Question ' + (state.currentQ + 1) + ' of ' + total + '</span>' +
      (state.currentQ > 0 ? '<button class="qback" data-action="back">← Back</button>' : '') +
      '</div><div class="progress"><div class="progress-fill" style="width:' + progress + '%"></div><div class="progress-dot" style="left:' + progress + '%"></div></div>' +
      '</div></div>' +
      '<div class="quiz-body"><div class="quiz-body-inner fade"><div class="q-head">' +
      (q.note ? '<div class="q-note">' + q.note + '</div>' : '') +
      '<h2 class="q-text">' + esc(q.text) + '</h2></div>' +
      '<div class="q-options">' +
      q.options.map(function (opt) {
        var isSel = selected === opt.value;
        return '<button class="opt' + (isSel ? " sel" : "") + '" data-action="answer" data-qid="' + q.id + '" data-value="' + opt.value + '">' +
          '<span class="opt-radio">' + (isSel ? '<span class="opt-dot"></span>' : '') + '</span>' + esc(opt.text) + '</button>';
      }).join("") +
      '</div></div></div></div>';
  }

  function fullResultCard(catKey, rank, isOpen) {
    var cat = CATS[catKey];
    var head = '<button class="frc-head" data-action="toggle" data-idx="' + rank + '" style="background:' + (isOpen ? cat.color : "#FAFAFC") + '">' +
      rankBadge(rank, isOpen) +
      '<div class="frc-titles"><div class="frc-name" style="color:' + (isOpen ? "#fff" : "#1B1B2F") + '">' + cat.name + '</div>' +
      '<div class="frc-tag" style="color:' + (isOpen ? "rgba(255,255,255,0.8)" : "#6B7280") + '">' + cat.tagline + '</div></div>' +
      '<div class="frc-chev" style="' + (isOpen ? "transform:rotate(180deg);color:#fff;border-color:rgba(255,255,255,0.4)" : "color:#9CA3AF;border-color:#E5E7EB") + '">▾</div></button>';
    if (!isOpen) return '<div class="frc" style="border-color:#E5E7EB;box-shadow:0 2px 8px rgba(0,0,0,0.04)">' + head + '</div>';

    var body = '<div class="frc-body">' +
      '<div class="frc-fits" style="background:' + cat.accent + '"><p><strong style="color:' + cat.color + '">Who this fits:</strong> ' + esc(cat.fitsBest) + '</p></div>' +
      '<div class="frc-block"><h4 class="sl-title">Business Ideas</h4><div class="chips">' +
      cat.examples.map(function (ex) { return '<span class="chip">' + esc(ex) + '</span>'; }).join("") + '</div></div>' +
      '<div class="frc-stats"><div class="stat"><div class="stat-label">Startup Difficulty</div>' + difficultyMeter(cat.difficulty) + '</div>' +
      '<div class="stat"><div class="stat-label">Time Needed</div><div class="stat-val">' + cat.weeklyTime + '</div></div></div>' +
      '<div class="frc-block"><h4 class="sl-title">Step-by-Step Launch Plan</h4>' +
      cat.launchPlan.map(function (step, i) { return '<div class="step"><div class="step-num">' + (i + 1) + '</div><p class="step-text">' + esc(step) + '</p></div>'; }).join("") + '</div>' +
      sectionList("Where to Find Your First Clients", cat.findClients) +
      sectionList("What to Charge", cat.charge) +
      sectionList("Tools You'll Actually Need", cat.tools) +
      sectionList("Common Mistakes Beginners Make", cat.mistakes) +
      '<div><h4 class="sl-title">Your First 30 Days</h4><div class="days">' +
      cat.first30.map(function (w) { return '<div class="day"><span class="day-week" style="color:' + cat.color + '">' + w.week + '</span><span class="day-text">' + esc(w.text) + '</span></div>'; }).join("") +
      '</div></div></div>';

    return '<div class="frc" style="border-color:' + cat.color + ';box-shadow:0 4px 24px ' + cat.color + '22">' + head + body + '</div>';
  }

  function lockedCard(catKey, rank) {
    var cat = CATS[catKey];
    var lines = [90, 75, 60].map(function (w) { return '<div class="lc-line" style="width:' + w + '%;background:' + cat.color + '44"></div>'; }).join("");
    var rows = "";
    for (var n = 0; n < 4; n++) rows += '<div class="lc-row"><div class="lc-dot2"></div><div class="lc-bar"></div></div>';
    return '<div class="lc">' +
      '<div class="lc-head" style="background:' + cat.color + '">' + rankBadge(rank, true) +
      '<div class="frc-titles"><div class="frc-name" style="color:#fff">' + cat.name + '</div><div class="frc-tag" style="color:rgba(255,255,255,0.8)">' + cat.tagline + '</div></div></div>' +
      '<div class="lc-blurwrap"><div class="lc-blur"><div class="lc-accent" style="background:' + cat.accent + '">' + lines + '</div>' + rows + '</div>' +
      '<div class="lc-overlay"><div class="lc-overlay-inner">' + lockIcon() +
      '<p class="lc-title">Full breakdown locked</p>' +
      '<p class="lc-desc">Unlock to see your full step-by-step launch plan, where to find clients, what to charge, tools you\'ll need, common mistakes, and your first 30 days.</p>' +
      '</div></div></div></div>';
  }

  function ResultsScreen() {
    var top3 = state.top3, ageNote = AGE_NOTES[state.age];
    var gumroad = GUMROAD_URL + "?wanted=true";
    var body;

    if (state.isUnlocked) {
      body = '<p class="results-hint">Tap each card to explore your match in detail ↓</p>' +
        top3.map(function (k, i) { return fullResultCard(k, i, state.openCard === i); }).join("") +
        '<div class="affirm"><h3>You Have All You Need</h3><p>Every successful entrepreneur started exactly where you are right now. Pick your top match, follow the first 3 steps, and take action this week. You already have what you need to abound in good work.</p></div>';
    } else {
      var items = ["Who each path fits and why it matched YOU", "Real business ideas for each of your top 3", "A full step-by-step launch plan — not just generic tips", "Where to find your first clients", "What to actually charge", "Tools you'll need", "Common beginner mistakes to avoid", "Your first 30 days mapped out"];
      body = top3.map(function (k, i) { return lockedCard(k, i); }).join("") +
        '<div class="unlock"><h2>Unlock Your Full Breakdown</h2>' +
        '<p>Get instant access to your complete results — no waiting, no email needed. Unlocks immediately after payment.</p>' +
        '<div class="unlock-list">' + items.map(function (it) { return '<div class="unlock-item">✓ ' + esc(it) + '</div>'; }).join("") + '</div>' +
        '<div class="unlock-price"><span class="price">$9</span><span class="price-note">one-time • instant access</span></div>' +
        '<a class="unlock-btn" href="' + gumroad + '">Unlock My Results Now — $9 →</a>' +
        '<p class="unlock-fine">Results unlock instantly after payment — right here on this page</p></div>';
    }

    return '<div class="results"><div class="results-hero"><div class="results-hero-glow"></div><div class="results-hero-inner">' +
      '<div class="brandmark">' + brandMark(28, "#C4B5FD") + '</div>' +
      '<h1 class="results-h1">' + (state.isUnlocked ? "Your Full Results Are Unlocked" : "Your Results Are In") + '</h1>' +
      '<p class="results-sub">' + (state.isUnlocked ? "Welcome! Your complete personalized breakdown is ready below." : "Here are your top 3 best-fit entrepreneurial paths. Unlock the full breakdown to see everything.") + '</p>' +
      (state.isUnlocked && ageNote ? '<div class="age-note">' + esc(ageNote) + '</div>' : '') +
      '<div class="top3-chips">' + top3.map(function (k) { return '<div class="top3-chip">' + CATS[k].name + '</div>'; }).join("") + '</div>' +
      '</div></div>' +
      '<div class="results-body">' + body +
      '<div class="retake-wrap"><button class="retake" data-action="restart">↺ Retake the Assessment</button></div></div>' +
      '<div class="disclaimer"><p>This is general guidance, not professional or legal advice. Content includes AI-assisted research. Results and income examples are not guaranteed. ' +
      '<a href="' + TERMS_URL + '" target="_blank" rel="noopener noreferrer">See full Terms &amp; Privacy Policy</a></p></div></div>';
  }

  // ── State + controller ──────────────────────────────────────────────────────
  var state = { screen: "intro", currentQ: 0, answers: {}, top3: [], scores: {}, age: "", isUnlocked: false, openCard: 0 };
  var app = document.getElementById("app");

  function view() {
    if (state.screen === "intro") return IntroScreen();
    if (state.screen === "quiz") return QuestionScreen();
    return ResultsScreen();
  }

  function render() { app.innerHTML = view(); }

  function handleAnswer(qId, value) {
    state.answers[qId] = value;
    if (state.currentQ < QUESTIONS.length - 1) {
      state.currentQ += 1;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    } else {
      var s = computeScores(state.answers);
      var t3 = getTop3(s);
      var userAge = state.answers.age || "";
      state.scores = s; state.top3 = t3; state.age = userAge;
      state.isUnlocked = false; state.openCard = 0;
      saveState(t3, s, userAge);
      state.screen = "results";
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  }

  function handleBack() {
    if (state.currentQ > 0) { state.currentQ -= 1; render(); }
  }

  function handleRestart() {
    state.screen = "intro"; state.currentQ = 0; state.answers = {};
    state.top3 = []; state.scores = {}; state.age = ""; state.isUnlocked = false; state.openCard = 0;
    window.history.replaceState({}, "", window.location.pathname);
    render();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  app.addEventListener("click", function (e) {
    var btn = e.target.closest("[data-action]");
    if (!btn) return;
    var action = btn.getAttribute("data-action");
    if (action === "start") { state.screen = "quiz"; render(); window.scrollTo({ top: 0 }); }
    else if (action === "back") { handleBack(); }
    else if (action === "answer") { handleAnswer(btn.getAttribute("data-qid"), btn.getAttribute("data-value")); }
    else if (action === "toggle") { var idx = parseInt(btn.getAttribute("data-idx"), 10); state.openCard = state.openCard === idx ? -1 : idx; render(); }
    else if (action === "restart") { handleRestart(); }
  });

  // ── Init: detect unlock redirect from Gumroad ───────────────────────────────
  (function init() {
    var params = new URLSearchParams(window.location.search);
    if (params.get("unlocked") === "true") {
      var t3p = params.get("top3"), sp = params.get("scores"), ap = params.get("age");
      if (t3p && sp) {
        try {
          state.top3 = t3p.split(",");
          state.scores = JSON.parse(decodeURIComponent(sp));
          state.age = ap || "";
          state.isUnlocked = true; state.screen = "results";
          render(); return;
        } catch (e) { /* fall through to sessionStorage */ }
      }
      var saved = loadState();
      if (saved.top3.length > 0) {
        state.top3 = saved.top3; state.scores = saved.scores; state.age = saved.age;
        state.isUnlocked = true; state.screen = "results";
      }
    }
    render();
  })();
  </script>
</body>
</html>
